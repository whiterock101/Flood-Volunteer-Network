
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> 
    <title>LIVE Community Flood Map | Community Updates</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <meta name="description" content="Live community-driven flood map for UAE. Report and check road conditions in real-time.">
    <meta name="keywords" content="Sharjah Flood, Dubai Rain, Muwailah Road Conditions, UAE Flood Map, Live Road Updates">
    <meta name="author" content="Lea Anzures">

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background-color: #f0f4f8; color: #333; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; border-top: 8px solid #28a745; }
        h2 { color: #1e7e34; margin: 0 0 5px 0; font-size: 24px; }
        .subtitle { font-size: 14px; color: #666; margin-bottom: 25px; }
        
        .gps-notice { background-color: #e7f3ff; padding: 12px; border-radius: 10px; font-size: 13px; margin-bottom: 20px; text-align: left; border: 1px solid #b3d7ff; color: #004085; line-height: 1.4; }
        
        label { display: block; text-align: left; font-weight: bold; margin: 15px 0 5px 5px; font-size: 14px; color: #444; }
        select, input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #d1d9e0; box-sizing: border-box; font-size: 16px; background-color: #fff; transition: border-color 0.3s; }
        select:focus, input:focus { border-color: #28a745; outline: none; }

        .btn-green { background-color: #28a745; color: white; padding: 18px; border: none; border-radius: 12px; cursor: pointer; font-size: 18px; width: 100%; font-weight: bold; transition: background 0.3s, transform 0.1s; box-shadow: 0 4px 6px rgba(40, 167, 69, 0.2); }
        .btn-green:hover { background-color: #218838; }
        .btn-green:active { transform: scale(0.98); }

        .btn-blue { background-color: #007bff; color: white; padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 15px; text-decoration: none; display: inline-block; font-weight: bold; transition: background 0.3s; }
        .btn-blue:hover { background-color: #0069d9; }

        #status { margin-top: 20px; font-weight: bold; color: #28a745; min-height: 24px; font-size: 15px; }
        .footer { margin-top: 40px; font-size: 11px; color: #aaa; line-height: 1.6; }
        hr { border: 0; border-top: 1px solid #eee; margin: 25px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>Flood Volunteer Network</h2>
    <p class="subtitle">Live Road Updates • UAE</p>

    <div class="gps-notice">
        <b>💡 HOW TO USE:</b> Enter the area name and flood level. If your phone asks for GPS, click <b>"Allow"</b> to pin the exact spot on the map!
    </div>

    <label>Current Road Condition:</label>
    <select id="floodLevel">
        <option value="Clear">🟢 Clear (No Flood)</option>
        <option value="Ankle">🟡 Ankle Deep (Safe for cars)</option>
        <option value="Knee">🟠 Knee Deep (Caution - High Cars only)</option>
        <option value="Waist">🔴 Waist Deep (Dangerous - Do not enter)</option>
        <option value="Submerged">🚫 Road Closed / Submerged</option>
    </select>

    <label>Location/Area Name and Landmark:</label>
    <input type="text" id="landmark" placeholder="e.g. Muwailah Commercial, Sharjah in front of Thumbay Hosp">

    <button class="btn-green" onclick="submitReport()">Share Update Now</button>
    <div id="status"></div>

    <hr>
    <p style="font-size: 13px; font-weight: bold; margin-bottom: 10px;">Check Real-Time Reports:</p>
    <a id="viewSheet" class="btn-blue" target="_blank">View Live Flood Map</a>

    <div class="footer">
        Community Project • Created by <b>Lea Anzures</b><br>
        Sharjah, UAE | March 2026
    </div>
</div>

<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

<script>
// --- YOUR GOOGLE FORM CONFIGURATION ---
const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSftkLmIz38aChbdouob_hsxfrAArkpqhOj9GjRsd5t51-HRmA/formResponse";
const LAT_ID = "entry.224957499"; 
const LON_ID = "entry.2119998920";
const LVL_ID = "entry.1735684480"; 
const LND_ID = "entry.2123057663";
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1jqvOtLpTU1lW8lWBrnyjAkFQZBOyeV91J8CpY_qzoHM/edit?resourcekey=&gid=723913191#gid=723913191";

// Link the button to your sheet
document.getElementById('viewSheet').href = SHEET_URL;

function submitReport() {
    const status = document.getElementById('status');
    const landmark = document.getElementById('landmark').value;
    const level = document.getElementById('floodLevel').value;

    if (!landmark) { 
        alert("Please enter a location, area name and landmark first!"); 
        return; 
    }

    status.style.color = "#28a745";
    status.innerText = "⏳ Processing your report...";

    // Use Geolocation if available
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            function(pos) {
                // Success: coordinates + data
                sendToGoogle(pos.coords.latitude, pos.coords.longitude, level, landmark);
            }, 
            function(error) {
                // Denied/Error: send landmark only
                console.warn("GPS access denied. Sending landmark only.");
                sendToGoogle("GPS Disabled", "GPS Disabled", level, landmark);
            }, 
            {enableHighAccuracy: true, timeout: 6000}
        );
    } else {
        // Browser doesn't support GPS
        sendToGoogle("Not Supported", "Not Supported", level, landmark);
    }
}

function sendToGoogle(lat, lon, lvl, lnd) {
    const status = document.getElementById('status');
    const form = document.createElement('form');
    form.action = FORM_URL;
    form.method = 'POST';
    form.target = 'hidden_iframe';

    const fields = {
        [LAT_ID]: lat, 
        [LON_ID]: lon, 
        [LVL_ID]: lvl, 
        [LND_ID]: lnd
    };

    for (const key in fields) {
        const input = document.createElement('input');
        input.type = 'hidden'; 
        input.name = key; 
        input.value = fields[key];
        form.appendChild(input);
    }

    document.body.appendChild(form);
    form.submit();
    
    // Give feedback and clear the form
    setTimeout(() => {
        document.body.removeChild(form);
        status.innerText = "✅ Report shared successfully!";
        alert("Thank you! Your report for " + lnd + " has been added to the database.");
        document.getElementById('landmark').value = "";
    }, 1200);
}
   
    // --- THE CACHE BUSTER HERE ---
    
    const BASE_SHEET_URL = "https://docs.google.com/spreadsheets/d/1t1reD-ify3N_Xjr2MdVt0V24aBYmqpVuN6_LrZsWtmM/edit?usp=sharing";
    
    // This generates a unique number based on the current second
    const FINAL_URL = BASE_SHEET_URL + "&t=" + new Date().getTime();

    // This updates the "View Live Flood Map" button automatically
    if (document.getElementById('viewSheet')) {
        document.getElementById('viewSheet').href = FINAL_URL;
    }
    
    // --- END OF CACHE BUSTER ---
</script>
</body>
</html>
